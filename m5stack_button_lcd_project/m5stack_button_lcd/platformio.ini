; PlatformIO Project Configuration File
;
; Target board : M5Stack Core ESP32
; Board ID     : m5stack-core-esp32
; Framework    : Arduino

[env:m5stack-core-esp32]
platform = espressif32
board = m5stack-core-esp32
framework = arduino
monitor_speed = 115200

; M5Unified provides the common M5 API, including LCD and buttons.
; M5GFX provides the display driver and Japanese efont fonts.
lib_deps =
    m5stack/M5Unified@^0.2.15
    m5stack/M5GFX@^0.2.21
