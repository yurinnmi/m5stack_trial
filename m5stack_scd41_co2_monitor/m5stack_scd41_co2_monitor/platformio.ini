; M5Stack Core ESP32 + Unit CO2L(SCD41) monitor
; Target: m5stack-core-esp32 / Arduino framework / M5Unified

[env:m5stack-core-esp32]
platform = espressif32
board = m5stack-core-esp32
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Keep the project reproducible while still using downloadable public libraries.
; PlatformIO will fetch dependencies automatically on the first build.
lib_deps =
    m5stack/M5Unified @ ^0.2.13
    sensirion/Sensirion I2C SCD4x @ ^1.1.0

build_unflags =
    -std=gnu++11
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=1

; If the latest espressif32 platform in your environment causes regressions,
; pin it here, for example:
; platform = espressif32 @ 6.10.0
